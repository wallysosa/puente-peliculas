name: Generar Lista M3U

on:
  workflow_dispatch:        # ejecución manual
  schedule:
    - cron: '0 */6 * * *'  # cada 6 horas automático

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar yt-dlp
        run: pip install -U yt-dlp

      - name: Crear cookies.txt desde secret
        run: echo "${{ secrets.COOKIES_TXT }}" > cookies.txt

      - name: Verificar cookies.txt
        run: |
          if [ ! -s cookies.txt ]; then
            echo "ERROR: cookies.txt está vacío"
            exit 1
          fi
          echo "cookies.txt OK ($(wc -l < cookies.txt) líneas)"

      - name: Ejecutar script
        run: python generar_lista.py

      - name: Verificar que el M3U no está vacío
        run: |
          if [ ! -s lista_total.m3u ]; then
            echo "ERROR: lista_total.m3u está vacío"
            exit 1
          fi
          echo "Canales encontrados: $(grep -c '#EXTINF' lista_total.m3u)"

      - name: Subir lista_total.m3u como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: lista-m3u
          path: lista_total.m3u
          retention-days: 1

      - name: Commitear lista al repo (opcional)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lista_total.m3u
          git diff --cached --quiet || git commit -m "Actualizar lista M3U [skip ci]"
          git push
