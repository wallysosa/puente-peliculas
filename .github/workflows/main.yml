name: Actualizar Lista M3U

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Crear archivo de cookies
      # Aquí usamos el secreto que guardaste en GitHub Settings
      run: |
        echo "${{ secrets.YT_COOKIES }}" > cookies.txt

    - name: Ejecutar script de unificación
      run: python update_playlist.py

    - name: Subir cambios a GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Borramos las cookies para que no se queden guardadas en tu repo público
        rm -f cookies.txt 
        git add lista_total.m3u
        git commit -m "Lista actualizada: $(date)" || exit 0
        git push
