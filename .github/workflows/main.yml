name: Generar Lista M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # soluciona el warning de Node.js

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar yt-dlp
        run: pip install -U yt-dlp

      # Escritura segura: evita que echo corrompa saltos de línea o caracteres especiales
      - name: Crear cookies.txt desde secret
        env:
          COOKIES_CONTENT: ${{ secrets.COOKIES_TXT }}
        run: printf '%s' "$COOKIES_CONTENT" > cookies.txt

      - name: Verificar cookies.txt
        run: |
          echo "--- Primeras 3 líneas de cookies.txt ---"
          head -3 cookies.txt
          echo "--- Fin preview ---"
          LINEAS=$(wc -l < cookies.txt)
          echo "Total líneas: $LINEAS"
          if [ "$LINEAS" -lt 2 ]; then
            echo "ERROR: cookies.txt parece vacío o inválido"
            exit 1
          fi

      - name: Ejecutar script
        run: python generar_lista.py

      - name: Verificar lista generada
        run: |
          if [ ! -s lista_total.m3u ]; then
            echo "ERROR: lista_total.m3u está vacío"
            exit 1
          fi
          echo "Canales encontrados: $(grep -c '#EXTINF' lista_total.m3u)"

      - name: Subir lista como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: lista-m3u
          path: lista_total.m3u
          retention-days: 1

      - name: Commitear lista al repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lista_total.m3u
          git diff --cached --quiet || git commit -m "Actualizar lista M3U [skip ci]"
          git push
